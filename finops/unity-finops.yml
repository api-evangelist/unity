specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Unity
providerId: unity
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Game Development
  - Cloud Gaming
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for Unity. Two distinct cost surfaces - revenue-tier-gated Unity
  Engine seat subscriptions and pay-as-you-go Unity Gaming Services with per-service free tiers and
  paid overage. Numeric pricing and MAU thresholds were not reconcilable from primary unity.com
  sources during this pass; meters and FOCUS columns are scoped to known service shape only.
sources:
  - https://unity.com
  - https://docs.unity.com/ugs/manual/overview
notes: unity.com/pricing, store.unity.com, and the UGS pricing-and-billing page returned 403 during
  reconciliation. Treat dollar values as pending; meter shape (per seat for Engine, per MAU / call
  for UGS) is reconciled.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Unity Technologies
serviceCategory: Game Development Platform
billingModel:
  pricingCategory: Subscription + Pay-As-You-Go
  billingFrequency: Annual (Engine) + Monthly (UGS)
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Unity
  ServiceCategory: Game Development Platform
  ProviderName: Unity
  PublisherName: Unity Technologies
  InvoiceIssuerName: Unity Technologies
  BillingCurrency: USD
meters:
  - name: engine_seats
    description: Unity Engine seats by tier (Personal / Pro / Industry / Enterprise); seat eligibility
      is gated by company revenue thresholds.
    unit: seat
    aggregation: max
    dimensions:
      - tier
      - billing_term
  - name: ugs_monthly_active_users
    description: Monthly active users counted by Unity Gaming Services for relevant services (e.g.
      Cloud Save, Authentication, Lobby).
    unit: mau
    aggregation: max
    dimensions:
      - service
      - project
  - name: multiplay_compute
    description: Multiplay Hosting compute consumption (cloud, bare metal, or hybrid).
    unit: instance-hour
    aggregation: sum
    dimensions:
      - region
      - instance_type
  - name: vivox_minutes
    description: Voice / text chat usage via Vivox.
    unit: minute
    aggregation: sum
    dimensions:
      - channel_type
principles:
  - name: Visibility
    description: Use the Unity Cloud / UGS dashboard and the Unity pricing estimator to see consumption
      per service; the estimator is non-binding so reconcile against actual invoice line items.
  - name: Allocation
    description: Use a separate Unity project per game / environment so MAU and Multiplay spend can
      be attributed; segment Engine seats per studio or business unit.
  - name: Optimization
    description: Stay inside per-service free tiers via auth-only flows where possible, batch Cloud
      Save writes, right-size Multiplay fleets and use lower-cost regions, and choose the engine
      tier that matches your revenue band rather than over-buying.
  - name: Accountability
    description: Assign an owner per Unity project to monitor MAU growth, with payment-details-on-file
      checks ahead of expected free-tier exhaustion to avoid the UGS access block.
maintainers:
