}

input CreateCloudCodeScriptInput {
  projectId: ID!
  environmentId: ID!
  name: String!
  code: String!
  parameters: [ScriptParameterInput!]
}

input ScriptParameterInput {
  name: String!
  type: String!
  required: Boolean!
  description: String
}

input InvokeFunctionInput {
  projectId: ID!
  environmentId: ID!
  functionName: String!
  playerId: ID!
