}

input JoinRelayInput {
  projectId: ID!
  environmentId: ID!
  joinCode: String!
}

input SendFriendRequestInput {
  projectId: ID!
  fromPlayerId: ID!
  toPlayerId: ID!
}

input UpdatePresenceInput {
  projectId: ID!
  playerId: ID!
  availability: PresenceAvailability!
  activityStatus: String
}

# ---------------------------------------------------------------------------
# Query Root
# ---------------------------------------------------------------------------

type Query {
  # Projects and Environments
  project(id: ID!): Project
  projects(organizationId: ID!): [Project!]!
  environment(projectId: ID!, environmentId: ID!): Environment
  environments(projectId: ID!): [Environment!]!

  # Build Automation
  build(projectId: ID!, buildId: ID!): Build
  builds(projectId: ID!, buildTargetId: ID): [Build!]!
  buildConfiguration(projectId: ID!, configId: ID!): BuildConfiguration
  buildConfigurations(projectId: ID!): [BuildConfiguration!]!

  # Cloud Code
  cloudCodeScript(projectId: ID!, environmentId: ID!, scriptName: String!): CloudCodeScript
  cloudCodeScripts(projectId: ID!, environmentId: ID!): [CloudCodeScript!]!
  cloudCodeModule(projectId: ID!, environmentId: ID!, moduleName: String!): CloudCodeModule
  cloudCodeModules(projectId: ID!, environmentId: ID!): [CloudCodeModule!]!

  # Cloud Save
  cloudSaveData(projectId: ID!, environmentId: ID!, playerId: ID!): [CloudSaveData!]!
  cloudSaveItem(projectId: ID!, environmentId: ID!, playerId: ID!, key: String!): CloudSaveData

  # Economy
  economy(projectId: ID!, environmentId: ID!): Economy
  economyCurrency(projectId: ID!, environmentId: ID!, currencyId: String!): EconomyCurrency
  economyCurrencies(projectId: ID!, environmentId: ID!): [EconomyCurrency!]!
  playerInventory(projectId: ID!, environmentId: ID!, playerId: ID!): [EconomyInventoryItem!]!

  # Leaderboards
  leaderboard(projectId: ID!, environmentId: ID!, leaderboardId: ID!): Leaderboard
  leaderboards(projectId: ID!, environmentId: ID!): [Leaderboard!]!
  leaderboardEntry(projectId: ID!, environmentId: ID!, leaderboardId: ID!, playerId: ID!): LeaderboardEntry
  leaderboardTopScores(projectId: ID!, environmentId: ID!, leaderboardId: ID!, limit: Int): [LeaderboardEntry!]!

  # Matchmaking
  matchmakerTicket(projectId: ID!, environmentId: ID!, ticketId: ID!): MatchmakerTicket
  matchmakerTickets(projectId: ID!, environmentId: ID!, queueName: String): [MatchmakerTicket!]!

  # Relay
  relay(projectId: ID!, environmentId: ID!): Relay
  relayRegions(projectId: ID!, environmentId: ID!): [RelayRegion!]!

  # Multiplay
  fleet(projectId: ID!, environmentId: ID!, fleetId: ID!): Fleet
  fleets(projectId: ID!, environmentId: ID!): [Fleet!]!
  server(projectId: ID!, environmentId: ID!, serverId: ID!): Server
  servers(projectId: ID!, environmentId: ID!, fleetId: ID): [Server!]!
  serverAllocation(projectId: ID!, environmentId: ID!, allocationId: ID!): ServerAllocation
  gameServer(projectId: ID!, environmentId: ID!, serverId: ID!): GameServer

  # Analytics
  analyticsEvents(projectId: ID!, environmentId: ID!, userId: String, limit: Int): [Event!]!

  # Remote Config
  remoteConfig(projectId: ID!, environmentId: ID!): RemoteConfig
  configValue(projectId: ID!, environmentId: ID!, key: String!): ConfigValue
  gameOverride(projectId: ID!, environmentId: ID!, overrideId: ID!): GameOverride
  gameOverrides(projectId: ID!, environmentId: ID!): [GameOverride!]!

  # Authentication
  player(projectId: ID!, playerId: ID!): Player
