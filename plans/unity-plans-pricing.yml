specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Unity
providerId: unity
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Game Development
  - Real-Time 3D
  - Cloud Gaming
description: Unity sells two distinct commercial surfaces - the Unity Engine subscription tiers (Personal,
  Pro, Industry, Enterprise) gated by company revenue thresholds, and Unity Gaming Services (Cloud
  Save, Authentication, Multiplay, Vivox, Lobby) on a pay-as-you-go model with free monthly tiers.
  The unity.com pricing pages and store.unity.com block automated fetching at our origin, so concrete
  per-seat and per-MAU pricing could not be reconciled from primary sources during this pass; reduce
  to a Contact Sales scaffold until a successful WebFetch lands.
sources:
  - https://unity.com
  - https://docs.unity.com/ugs/manual/overview
notes: WebFetch returned 403 against unity.com/pricing, store.unity.com, and the UGS pricing-and-billing
  page. Documented qualitative model from docs.unity.com/ugs - free tier with usage limits, blocks
  access if exceeded without payment details - is preserved here, but numeric prices and MAU thresholds
  could not be confirmed from primary sources.
plans:
  - id: unity-contact-sales
    name: Contact Sales / See Unity Pricing
    type: enterprise
    description: Unity Engine seats and Unity Gaming Services pricing must be reconciled from unity.com
      directly. Engine sells Personal (revenue-gated free), Pro, Industry, and Enterprise tiers;
      UGS uses pay-as-you-go with per-service free tiers.
    entries:
      - label: Engine subscription
        name: engine_subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: see https://unity.com/pricing
        userMultiplied: true
      - label: Gaming Services usage
        name: ugs_usage
        type: metered
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://unity.com/solutions/gaming-services/pricing
        userMultiplied: false
    elements:
      - name: Unity Engine
      - name: Unity Cloud Save
      - name: Unity Authentication
      - name: Unity Multiplay Hosting
      - name: Vivox Voice and Text Chat
      - name: Unity Lobby
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
