naftiko: 1.0.0-alpha2
info:
  label: Unity Cloud Save API — Player Data
  description: 'Unity Cloud Save API — Player Data. 3 operations. Lead operation: Get Player Data. Self-contained Naftiko
    capability covering one Unity business surface.'
  tags:
  - Unity
  - Player Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITY_API_KEY: UNITY_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-save-player-data
    baseUri: https://cloud-save.services.api.unity.com
    description: Unity Cloud Save API — Player Data business capability. Self-contained, no shared references.
    resources:
    - name: v1-data-projects-projectId-players-playerId
      path: /v1/data/projects/{projectId}/players/{playerId}
      operations:
      - name: getplayerdata
        method: GET
        description: Get Player Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: playerId
          in: path
          type: string
          required: true
        - name: keys
          in: query
          type: array
          description: Filter by specific keys
    - name: v1-data-projects-projectId-players-playerId-items
      path: /v1/data/projects/{projectId}/players/{playerId}/items
      operations:
      - name: setplayerdata
        method: POST
        description: Set Player Data Items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: playerId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-data-projects-projectId-players-playerId-items-key
      path: /v1/data/projects/{projectId}/players/{playerId}/items/{key}
      operations:
      - name: deleteplayerdataitem
        method: DELETE
        description: Delete Player Data Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: playerId
          in: path
          type: string
          required: true
        - name: key
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.UNITY_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-save-player-data-rest
    port: 8080
    description: REST adapter for Unity Cloud Save API — Player Data. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/data/projects/{projectid}/players/{playerid}
      name: v1-data-projects-projectid-players-playerid
      description: REST surface for v1-data-projects-projectId-players-playerId.
      operations:
      - method: GET
        name: getplayerdata
        description: Get Player Data
        call: cloud-save-player-data.getplayerdata
        with:
          projectId: rest.projectId
          playerId: rest.playerId
          keys: rest.keys
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/data/projects/{projectid}/players/{playerid}/items
      name: v1-data-projects-projectid-players-playerid-items
      description: REST surface for v1-data-projects-projectId-players-playerId-items.
      operations:
      - method: POST
        name: setplayerdata
        description: Set Player Data Items
        call: cloud-save-player-data.setplayerdata
        with:
          projectId: rest.projectId
          playerId: rest.playerId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/data/projects/{projectid}/players/{playerid}/items/{key}
      name: v1-data-projects-projectid-players-playerid-items-key
      description: REST surface for v1-data-projects-projectId-players-playerId-items-key.
      operations:
      - method: DELETE
        name: deleteplayerdataitem
        description: Delete Player Data Item
        call: cloud-save-player-data.deleteplayerdataitem
        with:
          projectId: rest.projectId
          playerId: rest.playerId
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-save-player-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unity Cloud Save API — Player Data. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-player-data
      description: Get Player Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-save-player-data.getplayerdata
      with:
        projectId: tools.projectId
        playerId: tools.playerId
        keys: tools.keys
      outputParameters:
      - type: object
        mapping: $.
    - name: set-player-data-items
      description: Set Player Data Items
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-save-player-data.setplayerdata
      with:
        projectId: tools.projectId
        playerId: tools.playerId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-player-data-item
      description: Delete Player Data Item
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: cloud-save-player-data.deleteplayerdataitem
      with:
        projectId: tools.projectId
        playerId: tools.playerId
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
