naftiko: 1.0.0-alpha2
info:
  label: Unity Cloud Code API — Modules
  description: 'Unity Cloud Code API — Modules. 4 operations. Lead operation: List Modules. Self-contained Naftiko capability
    covering one Unity business surface.'
  tags:
  - Unity
  - Modules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITY_API_KEY: UNITY_API_KEY
capability:
