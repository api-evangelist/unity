naftiko: 1.0.0-alpha2
info:
  label: Unity Player Authentication API — Identity Providers
  description: 'Unity Player Authentication API — Identity Providers. 3 operations. Lead operation: Sign In With External
    Token. Self-contained Naftiko capability covering one Unity business surface.'
  tags:
  - Unity
  - Identity Providers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITY_API_KEY: UNITY_API_KEY
capability:
  consumes:
  - type: http
    namespace: player-authentication-identity-providers
    baseUri: https://player-auth.services.api.unity.com
    description: Unity Player Authentication API — Identity Providers business capability. Self-contained, no shared references.
    resources:
    - name: v1-authentication-external-token
      path: /v1/authentication/external-token
      operations:
      - name: signinwithexternaltoken
        method: POST
        description: Sign In With External Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-players-playerId-link-external-token
      path: /v1/players/{playerId}/link/external-token
      operations:
      - name: linkexternalidentity
        method: POST
        description: Link External Identity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: playerId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-players-playerId-unlink-external-token
      path: /v1/players/{playerId}/unlink/external-token
      operations:
      - name: unlinkexternalidentity
        method: POST
        description: Unlink External Identity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: playerId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UNITY_API_KEY}}'
  exposes:
  - type: rest
    namespace: player-authentication-identity-providers-rest
    port: 8080
    description: REST adapter for Unity Player Authentication API — Identity Providers. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/authentication/external-token
      name: v1-authentication-external-token
      description: REST surface for v1-authentication-external-token.
      operations:
      - method: POST
        name: signinwithexternaltoken
        description: Sign In With External Token
        call: player-authentication-identity-providers.signinwithexternaltoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/players/{playerid}/link/external-token
      name: v1-players-playerid-link-external-token
      description: REST surface for v1-players-playerId-link-external-token.
      operations:
      - method: POST
        name: linkexternalidentity
        description: Link External Identity
        call: player-authentication-identity-providers.linkexternalidentity
        with:
          playerId: rest.playerId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/players/{playerid}/unlink/external-token
      name: v1-players-playerid-unlink-external-token
      description: REST surface for v1-players-playerId-unlink-external-token.
      operations:
      - method: POST
        name: unlinkexternalidentity
        description: Unlink External Identity
        call: player-authentication-identity-providers.unlinkexternalidentity
        with:
          playerId: rest.playerId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: player-authentication-identity-providers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unity Player Authentication API — Identity Providers. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: sign-external-token
      description: Sign In With External Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: player-authentication-identity-providers.signinwithexternaltoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: link-external-identity
      description: Link External Identity
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: player-authentication-identity-providers.linkexternalidentity
      with:
        playerId: tools.playerId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: unlink-external-identity
      description: Unlink External Identity
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: player-authentication-identity-providers.unlinkexternalidentity
      with:
        playerId: tools.playerId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
