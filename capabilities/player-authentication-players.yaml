naftiko: 1.0.0-alpha2
info:
  label: Unity Player Authentication API — Players
  description: 'Unity Player Authentication API — Players. 3 operations. Lead operation: List Players. Self-contained Naftiko
    capability covering one Unity business surface.'
  tags:
  - Unity
  - Players
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITY_API_KEY: UNITY_API_KEY
capability:
  consumes:
  - type: http
    namespace: player-authentication-players
    baseUri: https://player-auth.services.api.unity.com
    description: Unity Player Authentication API — Players business capability. Self-contained, no shared references.
    resources:
    - name: v1-players
      path: /v1/players
      operations:
      - name: listplayers
        method: GET
        description: List Players
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: after
          in: query
          type: string
    - name: v1-players-playerId
      path: /v1/players/{playerId}
      operations:
      - name: getplayer
        method: GET
        description: Get Player
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: playerId
          in: path
          type: string
          required: true
      - name: deleteplayer
        method: DELETE
        description: Delete Player
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: playerId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.UNITY_API_KEY}}'
  exposes:
  - type: rest
    namespace: player-authentication-players-rest
    port: 8080
    description: REST adapter for Unity Player Authentication API — Players. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/players
      name: v1-players
      description: REST surface for v1-players.
      operations:
      - method: GET
        name: listplayers
        description: List Players
        call: player-authentication-players.listplayers
        with:
          limit: rest.limit
          after: rest.after
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/players/{playerid}
      name: v1-players-playerid
      description: REST surface for v1-players-playerId.
      operations:
      - method: GET
        name: getplayer
        description: Get Player
        call: player-authentication-players.getplayer
        with:
          playerId: rest.playerId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteplayer
        description: Delete Player
        call: player-authentication-players.deleteplayer
        with:
          playerId: rest.playerId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: player-authentication-players-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unity Player Authentication API — Players. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-players
      description: List Players
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: player-authentication-players.listplayers
      with:
        limit: tools.limit
        after: tools.after
      outputParameters:
      - type: object
        mapping: $.
    - name: get-player
      description: Get Player
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: player-authentication-players.getplayer
      with:
        playerId: tools.playerId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-player
      description: Delete Player
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: player-authentication-players.deleteplayer
      with:
        playerId: tools.playerId
      outputParameters:
      - type: object
        mapping: $.
