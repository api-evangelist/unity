naftiko: 1.0.0-alpha2
info:
  label: Unity Multiplay Game Server Hosting API — Builds
  description: 'Unity Multiplay Game Server Hosting API — Builds. 3 operations. Lead operation: List Builds. Self-contained
    Naftiko capability covering one Unity business surface.'
  tags:
  - Unity
  - Builds
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITY_API_KEY: UNITY_API_KEY
capability:
  consumes:
  - type: http
    namespace: multiplay-builds
    baseUri: https://multiplay.services.api.unity.com
    description: Unity Multiplay Game Server Hosting API — Builds business capability. Self-contained, no shared references.
    resources:
    - name: v1-projects-projectId-builds
      path: /v1/projects/{projectId}/builds
      operations:
      - name: listbuilds
        method: GET
        description: List Builds
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
      - name: createbuild
        method: POST
        description: Create Build
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-projects-projectId-builds-buildId
      path: /v1/projects/{projectId}/builds/{buildId}
      operations:
      - name: getbuild
        method: GET
        description: Get Build
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: buildId
          in: path
          type: integer
          required: true
    authentication:
      type: bearer
      token: '{{env.UNITY_API_KEY}}'
  exposes:
  - type: rest
    namespace: multiplay-builds-rest
    port: 8080
    description: REST adapter for Unity Multiplay Game Server Hosting API — Builds. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/projects/{projectid}/builds
      name: v1-projects-projectid-builds
      description: REST surface for v1-projects-projectId-builds.
      operations:
      - method: GET
        name: listbuilds
        description: List Builds
        call: multiplay-builds.listbuilds
        with:
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbuild
        description: Create Build
        call: multiplay-builds.createbuild
        with:
          projectId: rest.projectId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/projects/{projectid}/builds/{buildid}
      name: v1-projects-projectid-builds-buildid
      description: REST surface for v1-projects-projectId-builds-buildId.
      operations:
      - method: GET
        name: getbuild
        description: Get Build
        call: multiplay-builds.getbuild
        with:
          projectId: rest.projectId
          buildId: rest.buildId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: multiplay-builds-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unity Multiplay Game Server Hosting API — Builds. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-builds
      description: List Builds
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: multiplay-builds.listbuilds
      with:
        projectId: tools.projectId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-build
      description: Create Build
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: multiplay-builds.createbuild
      with:
        projectId: tools.projectId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-build
      description: Get Build
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: multiplay-builds.getbuild
      with:
        projectId: tools.projectId
        buildId: tools.buildId
      outputParameters:
      - type: object
        mapping: $.
