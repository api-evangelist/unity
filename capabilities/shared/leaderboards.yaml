naftiko: "1.0.0-alpha1"

info:
  label: "Unity Leaderboards"
  description: "Unity Leaderboards REST API for managing competitive player rankings in games. Provides Admin endpoints for leaderboard configuration and Player endpoints for score submission and retrieval."
  tags:
    - Unity
    - Leaderboards
    - Rankings
    - Competitive Gaming
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNITY_LEADERBOARDS_TOKEN: UNITY_LEADERBOARDS_TOKEN

capability:
  consumes:
    - type: http
      namespace: unity-leaderboards
      baseUri: https://leaderboards.services.api.unity.com
      description: "Unity Leaderboards API for player score management and ranking"
      authentication:
        type: bearer
        token: "{{UNITY_LEADERBOARDS_TOKEN}}"
      resources:
        - name: leaderboards
          path: /v1/projects/{projectId}/environments/{environmentId}/leaderboards
          description: "Leaderboard configuration management"
          operations:
            - name: list-leaderboards
              method: GET
              description: "List all leaderboard definitions"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: "Unity project identifier"
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of leaderboards to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-leaderboard
              method: POST
              description: "Create a new leaderboard definition"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: "Unity project identifier"
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.leaderboard_id}}"
                  sortOrder: "{{tools.sort_order}}"
        - name: scores
          path: /v1/projects/{projectId}/environments/{environmentId}/leaderboards/{leaderboardId}/scores/players/{playerId}
          description: "Player score operations"
          operations:
            - name: add-player-score
              method: POST
              description: "Submit a player score to a leaderboard"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: "Unity project identifier"
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: leaderboardId
                  in: path
                  type: string
                  required: true
                  description: "Leaderboard identifier"
                - name: playerId
                  in: path
                  type: string
                  required: true
                  description: "Unity player identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  score: "{{tools.score}}"
                  metadata: "{{tools.metadata}}"
            - name: get-player-score
              method: GET
              description: "Retrieve a player's score and rank"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: "Unity project identifier"
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: leaderboardId
                  in: path
                  type: string
                  required: true
                  description: "Leaderboard identifier"
                - name: playerId
                  in: path
                  type: string
                  required: true
                  description: "Unity player identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: leaderboard-scores
          path: /v1/projects/{projectId}/environments/{environmentId}/leaderboards/{leaderboardId}/scores
          description: "Top scores for a leaderboard"
          operations:
            - name: get-leaderboard-scores
              method: GET
              description: "Retrieve top scores for a leaderboard"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: "Unity project identifier"
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: leaderboardId
                  in: path
                  type: string
                  required: true
                  description: "Leaderboard identifier"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of scores to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8110
      namespace: unity-leaderboards-api
      resources:
        - path: /v1/leaderboards
          name: leaderboards
          description: "Leaderboard management endpoints"
          operations:
            - method: GET
              name: list-leaderboards
              description: "List all leaderboards"
              call: "unity-leaderboards.list-leaderboards"
              with:
                projectId: "rest.projectId"
                environmentId: "rest.environmentId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-leaderboard
              description: "Create a new leaderboard"
              call: "unity-leaderboards.create-leaderboard"
              with:
                projectId: "rest.projectId"
                environmentId: "rest.environmentId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/leaderboards/{leaderboardId}/scores
          name: leaderboard-scores
          description: "Leaderboard score endpoints"
          operations:
            - method: GET
              name: get-leaderboard-scores
              description: "Get top scores for a leaderboard"
              call: "unity-leaderboards.get-leaderboard-scores"
              with:
                projectId: "rest.projectId"
                environmentId: "rest.environmentId"
                leaderboardId: "rest.leaderboardId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/leaderboards/{leaderboardId}/scores/players/{playerId}
          name: player-scores
          description: "Per-player score endpoints"
          operations:
            - method: POST
              name: add-player-score
              description: "Submit player score"
              call: "unity-leaderboards.add-player-score"
              with:
                projectId: "rest.projectId"
                environmentId: "rest.environmentId"
                leaderboardId: "rest.leaderboardId"
                playerId: "rest.playerId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: get-player-score
              description: "Get player score and rank"
              call: "unity-leaderboards.get-player-score"
              with:
                projectId: "rest.projectId"
                environmentId: "rest.environmentId"
                leaderboardId: "rest.leaderboardId"
                playerId: "rest.playerId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9110
      namespace: unity-leaderboards-mcp
      transport: http
      tools:
        - name: list-leaderboards
          description: "List all leaderboard configurations"
          hints:
            readOnly: true
            openWorld: true
          call: "unity-leaderboards.list-leaderboards"
          with:
            projectId: "tools.projectId"
            environmentId: "tools.environmentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-leaderboard
          description: "Create a new leaderboard"
          hints:
            readOnly: false
            idempotent: false
          call: "unity-leaderboards.create-leaderboard"
          with:
            projectId: "tools.projectId"
            environmentId: "tools.environmentId"
            leaderboard_id: "tools.leaderboard_id"
            sort_order: "tools.sort_order"
          outputParameters:
            - type: object
              mapping: "$."
        - name: submit-player-score
          description: "Submit a player score to a leaderboard"
          hints:
            readOnly: false
            idempotent: true
          call: "unity-leaderboards.add-player-score"
          with:
            projectId: "tools.projectId"
            environmentId: "tools.environmentId"
            leaderboardId: "tools.leaderboardId"
            playerId: "tools.playerId"
            score: "tools.score"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-player-rank
          description: "Get a player's current rank and score on a leaderboard"
          hints:
            readOnly: true
            openWorld: true
          call: "unity-leaderboards.get-player-score"
          with:
            projectId: "tools.projectId"
            environmentId: "tools.environmentId"
            leaderboardId: "tools.leaderboardId"
            playerId: "tools.playerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-top-scores
          description: "Retrieve the top scores from a leaderboard"
          hints:
            readOnly: true
            openWorld: true
          call: "unity-leaderboards.get-leaderboard-scores"
          with:
            projectId: "tools.projectId"
            environmentId: "tools.environmentId"
            leaderboardId: "tools.leaderboardId"
          outputParameters:
            - type: object
              mapping: "$."
