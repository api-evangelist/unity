naftiko: "1.0.0-alpha1"

info:
  label: "Unity Player Authentication"
  description: "Unity Player Authentication REST API for managing player identity and authentication workflows. Supports anonymous sign-in, username/password, and external identity providers."
  tags:
    - Unity
    - Authentication
    - Identity
    - Players
    - OAuth
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNITY_AUTH_TOKEN: UNITY_AUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: unity-auth
      baseUri: https://player-auth.services.api.unity.com
      description: "Unity Player Authentication API"
      authentication:
        type: bearer
        token: "{{UNITY_AUTH_TOKEN}}"
      resources:
        - name: anonymous-auth
          path: /v1/authentication/anonymous
          description: "Anonymous player authentication"
          operations:
            - name: sign-in-anonymously
              method: POST
              description: "Sign in a player anonymously"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  sessionTokens: "{{tools.session_tokens}}"
        - name: username-password-auth
          path: /v1/authentication/usernamepassword/sign-in
          description: "Username and password sign-in"
          operations:
            - name: sign-in-with-password
              method: POST
              description: "Sign in with username and password"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  username: "{{tools.username}}"
                  password: "{{tools.password}}"
        - name: external-token-auth
          path: /v1/authentication/external-token
          description: "External identity provider authentication"
          operations:
            - name: sign-in-with-external-token
              method: POST
              description: "Sign in with external identity provider token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  idProvider: "{{tools.id_provider}}"
                  token: "{{tools.token}}"
        - name: token-refresh
          path: /v1/token/refresh
          description: "Token refresh"
          operations:
            - name: refresh-token
              method: POST
              description: "Refresh an authentication token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  refreshToken: "{{tools.refresh_token}}"
        - name: players-admin
          path: /v1/players
          description: "Player account administration"
          operations:
            - name: list-players
              method: GET
              description: "List all players in the project"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of players to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: player-admin
          path: /v1/players/{playerId}
          description: "Individual player management"
          operations:
            - name: get-player
              method: GET
              description: "Get player details"
              inputParameters:
                - name: playerId
                  in: path
                  type: string
                  required: true
                  description: "Unity player identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-player
              method: DELETE
              description: "Delete a player account"
              inputParameters:
                - name: playerId
                  in: path
                  type: string
                  required: true
                  description: "Unity player identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8112
      namespace: unity-auth-api
      resources:
        - path: /v1/players
          name: players
          description: "Player management endpoints"
          operations:
            - method: GET
              name: list-players
              description: "List all players"
              call: "unity-auth.list-players"
              with: {}
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/players/{playerId}
          name: player
          description: "Individual player endpoints"
          operations:
            - method: GET
              name: get-player
              description: "Get player details"
              call: "unity-auth.get-player"
              with:
                playerId: "rest.playerId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9112
      namespace: unity-auth-mcp
      transport: http
      tools:
        - name: list-players
          description: "List all player accounts in the project"
          hints:
            readOnly: true
            openWorld: true
          call: "unity-auth.list-players"
          with: {}
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-player
          description: "Get details for a specific player account"
          hints:
            readOnly: true
            openWorld: false
          call: "unity-auth.get-player"
          with:
            playerId: "tools.playerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-player
          description: "Delete a player account"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "unity-auth.delete-player"
          with:
            playerId: "tools.playerId"
          outputParameters:
            - type: object
              mapping: "$."
