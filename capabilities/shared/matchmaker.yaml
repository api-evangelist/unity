naftiko: "1.0.0-alpha1"

info:
  label: "Unity Matchmaker"
  description: "Unity Matchmaker REST API for player matchmaking. Creates and manages matchmaking tickets, configures queues and pools for skill-based and attribute-based player matching."
  tags:
    - Unity
    - Matchmaker
    - Matchmaking
    - Multiplayer
    - Skill-Based Matching
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNITY_MATCHMAKER_TOKEN: UNITY_MATCHMAKER_TOKEN

capability:
  consumes:
    - type: http
      namespace: unity-matchmaker
      baseUri: https://matchmaker.services.api.unity.com
      description: "Unity Matchmaker API for player matching"
      authentication:
        type: bearer
        token: "{{UNITY_MATCHMAKER_TOKEN}}"
      resources:
        - name: tickets
          path: /v3/projects/{projectId}/environments/{environmentId}/tickets
          description: "Matchmaking ticket management"
          operations:
            - name: create-ticket
              method: POST
              description: "Create a matchmaking ticket"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: "Unity project identifier"
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  players: "{{tools.players}}"
                  queueName: "{{tools.queue_name}}"
        - name: ticket-by-id
          path: /v3/projects/{projectId}/environments/{environmentId}/tickets/{ticketId}
          description: "Ticket status and deletion"
          operations:
            - name: get-ticket
              method: GET
              description: "Get matchmaking ticket status"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: "Unity project identifier"
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: ticketId
                  in: path
                  type: string
                  required: true
                  description: "Ticket identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-ticket
              method: DELETE
              description: "Cancel a matchmaking ticket"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: "Unity project identifier"
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: ticketId
                  in: path
                  type: string
                  required: true
                  description: "Ticket identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: queues
          path: /v3/projects/{projectId}/environments/{environmentId}/queues
          description: "Matchmaking queue configuration"
          operations:
            - name: list-queues
              method: GET
              description: "List all matchmaking queues"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: "Unity project identifier"
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8114
      namespace: unity-matchmaker-api
      resources:
        - path: /v1/tickets
          name: tickets
          description: "Matchmaking ticket endpoints"
          operations:
            - method: POST
              name: create-ticket
              description: "Create a matchmaking ticket"
              call: "unity-matchmaker.create-ticket"
              with:
                projectId: "rest.projectId"
                environmentId: "rest.environmentId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tickets/{ticketId}
          name: ticket
          description: "Individual ticket endpoints"
          operations:
            - method: GET
              name: get-ticket
              description: "Get ticket status"
              call: "unity-matchmaker.get-ticket"
              with:
                projectId: "rest.projectId"
                environmentId: "rest.environmentId"
                ticketId: "rest.ticketId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: cancel-ticket
              description: "Cancel a ticket"
              call: "unity-matchmaker.delete-ticket"
              with:
                projectId: "rest.projectId"
                environmentId: "rest.environmentId"
                ticketId: "rest.ticketId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/queues
          name: queues
          description: "Queue management endpoints"
          operations:
            - method: GET
              name: list-queues
              description: "List all queues"
              call: "unity-matchmaker.list-queues"
              with:
                projectId: "rest.projectId"
                environmentId: "rest.environmentId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9114
      namespace: unity-matchmaker-mcp
      transport: http
      tools:
        - name: create-matchmaking-ticket
          description: "Enter a player into the matchmaking queue"
          hints:
            readOnly: false
            idempotent: false
          call: "unity-matchmaker.create-ticket"
          with:
            projectId: "tools.projectId"
            environmentId: "tools.environmentId"
            players: "tools.players"
            queue_name: "tools.queue_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-matchmaking-status
          description: "Check the status of a matchmaking ticket"
          hints:
            readOnly: true
            openWorld: false
          call: "unity-matchmaker.get-ticket"
          with:
            projectId: "tools.projectId"
            environmentId: "tools.environmentId"
            ticketId: "tools.ticketId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cancel-matchmaking
          description: "Cancel a matchmaking ticket"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "unity-matchmaker.delete-ticket"
          with:
            projectId: "tools.projectId"
            environmentId: "tools.environmentId"
            ticketId: "tools.ticketId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-matchmaking-queues
          description: "List all configured matchmaking queues"
          hints:
            readOnly: true
            openWorld: true
          call: "unity-matchmaker.list-queues"
          with:
            projectId: "tools.projectId"
            environmentId: "tools.environmentId"
          outputParameters:
            - type: object
              mapping: "$."
