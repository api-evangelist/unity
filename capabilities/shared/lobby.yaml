naftiko: "1.0.0-alpha1"

info:
  label: "Unity Lobby"
  description: "Unity Lobby REST API for creating and managing multiplayer game lobbies. Players can create, join, search, and manage lobbies before or during game sessions."
  tags:
    - Unity
    - Lobby
    - Multiplayer
    - Game Sessions
    - Matchmaking
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNITY_LOBBY_TOKEN: UNITY_LOBBY_TOKEN

capability:
  consumes:
    - type: http
      namespace: unity-lobby
      baseUri: https://lobby.services.api.unity.com
      description: "Unity Lobby API for multiplayer lobby management"
      authentication:
        type: bearer
        token: "{{UNITY_LOBBY_TOKEN}}"
      resources:
        - name: lobbies
          path: /v1/lobbies
          description: "Lobby creation and listing"
          operations:
            - name: create-lobby
              method: POST
              description: "Create a new multiplayer lobby"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  maxPlayers: "{{tools.max_players}}"
                  isPrivate: "{{tools.is_private}}"
        - name: lobby-by-id
          path: /v1/lobbies/{lobbyId}
          description: "Lobby management by ID"
          operations:
            - name: get-lobby
              method: GET
              description: "Get lobby details"
              inputParameters:
                - name: lobbyId
                  in: path
                  type: string
                  required: true
                  description: "Lobby identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-lobby
              method: PATCH
              description: "Update lobby configuration"
              inputParameters:
                - name: lobbyId
                  in: path
                  type: string
                  required: true
                  description: "Lobby identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  isLocked: "{{tools.is_locked}}"
            - name: delete-lobby
              method: DELETE
              description: "Delete a lobby"
              inputParameters:
                - name: lobbyId
                  in: path
                  type: string
                  required: true
                  description: "Lobby identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: lobby-join
          path: /v1/lobbies/{lobbyId}/join
          description: "Join a lobby by ID"
          operations:
            - name: join-lobby-by-id
              method: POST
              description: "Join a lobby using its ID"
              inputParameters:
                - name: lobbyId
                  in: path
                  type: string
                  required: true
                  description: "Lobby identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  playerId: "{{tools.player_id}}"
        - name: lobby-by-code
          path: /v1/lobbies/code/{lobbyCode}
          description: "Join a lobby by code"
          operations:
            - name: join-lobby-by-code
              method: POST
              description: "Join a lobby using its join code"
              inputParameters:
                - name: lobbyCode
                  in: path
                  type: string
                  required: true
                  description: "Lobby join code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  playerId: "{{tools.player_id}}"
        - name: lobby-query
          path: /v1/lobbies/query
          description: "Search for available lobbies"
          operations:
            - name: query-lobbies
              method: POST
              description: "Search for public lobbies with filters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  count: "{{tools.count}}"
        - name: lobby-heartbeat
          path: /v1/lobbies/{lobbyId}/heartbeat
          description: "Lobby heartbeat"
          operations:
            - name: heartbeat-lobby
              method: POST
              description: "Send heartbeat to keep lobby active"
              inputParameters:
                - name: lobbyId
                  in: path
                  type: string
                  required: true
                  description: "Lobby identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8113
      namespace: unity-lobby-api
      resources:
        - path: /v1/lobbies
          name: lobbies
          description: "Lobby management"
          operations:
            - method: POST
              name: create-lobby
              description: "Create a new lobby"
              call: "unity-lobby.create-lobby"
              with: {}
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/lobbies/{lobbyId}
          name: lobby
          description: "Lobby by ID"
          operations:
            - method: GET
              name: get-lobby
              description: "Get lobby details"
              call: "unity-lobby.get-lobby"
              with:
                lobbyId: "rest.lobbyId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/lobbies/search
          name: lobby-search
          description: "Lobby search"
          operations:
            - method: POST
              name: search-lobbies
              description: "Search for available lobbies"
              call: "unity-lobby.query-lobbies"
              with: {}
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9113
      namespace: unity-lobby-mcp
      transport: http
      tools:
        - name: create-lobby
          description: "Create a new multiplayer lobby"
          hints:
            readOnly: false
            idempotent: false
          call: "unity-lobby.create-lobby"
          with:
            name: "tools.name"
            max_players: "tools.max_players"
            is_private: "tools.is_private"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-lobby
          description: "Get details of a specific lobby"
          hints:
            readOnly: true
            openWorld: false
          call: "unity-lobby.get-lobby"
          with:
            lobbyId: "tools.lobbyId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: join-lobby
          description: "Join a lobby by its ID"
          hints:
            readOnly: false
            idempotent: false
          call: "unity-lobby.join-lobby-by-id"
          with:
            lobbyId: "tools.lobbyId"
            player_id: "tools.player_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-lobbies
          description: "Search for available public lobbies"
          hints:
            readOnly: true
            openWorld: true
          call: "unity-lobby.query-lobbies"
          with:
            count: "tools.count"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-lobby
          description: "Delete a lobby"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "unity-lobby.delete-lobby"
          with:
            lobbyId: "tools.lobbyId"
          outputParameters:
            - type: object
              mapping: "$."
