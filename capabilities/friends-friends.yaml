naftiko: 1.0.0-alpha2
info:
  label: Unity Friends API — Friends
  description: 'Unity Friends API — Friends. 2 operations. Lead operation: List Friends. Self-contained Naftiko capability
    covering one Unity business surface.'
  tags:
  - Unity
  - Friends
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITY_API_KEY: UNITY_API_KEY
capability:
  consumes:
  - type: http
    namespace: friends-friends
    baseUri: https://social.services.api.unity.com
    description: Unity Friends API — Friends business capability. Self-contained, no shared references.
    resources:
    - name: v1-me-relationships-friends
      path: /v1/me/relationships/friends
      operations:
      - name: listfriends
        method: GET
        description: List Friends
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: after
          in: query
          type: string
    - name: v1-me-relationships-memberId
      path: /v1/me/relationships/{memberId}
      operations:
      - name: removefriendorrequest
        method: DELETE
        description: Remove Friend or Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: memberId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.UNITY_API_KEY}}'
  exposes:
  - type: rest
    namespace: friends-friends-rest
    port: 8080
    description: REST adapter for Unity Friends API — Friends. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/me/relationships/friends
      name: v1-me-relationships-friends
      description: REST surface for v1-me-relationships-friends.
      operations:
      - method: GET
        name: listfriends
        description: List Friends
        call: friends-friends.listfriends
        with:
          limit: rest.limit
          after: rest.after
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/me/relationships/{memberid}
      name: v1-me-relationships-memberid
      description: REST surface for v1-me-relationships-memberId.
      operations:
      - method: DELETE
        name: removefriendorrequest
        description: Remove Friend or Request
        call: friends-friends.removefriendorrequest
        with:
          memberId: rest.memberId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: friends-friends-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unity Friends API — Friends. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-friends
      description: List Friends
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: friends-friends.listfriends
      with:
        limit: tools.limit
        after: tools.after
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-friend-request
      description: Remove Friend or Request
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: friends-friends.removefriendorrequest
      with:
        memberId: tools.memberId
      outputParameters:
      - type: object
        mapping: $.
